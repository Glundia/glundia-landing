name: Deploy Landing Page to PROD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: glundia
  BUCKET_NAME: glundia-landing
  CDN_BACKEND: glundia-landing-backend

jobs:
  deploy:
    name: Deploy Landing Page to PROD
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT_PROD }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy static files to Cloud Storage
        run: |
          # Upload all HTML, CSS, JS, and image files
          gsutil -m rsync -r -d \
            -x ".*\.git.*|.*\.github.*|README\.md" \
            . gs://${{ env.BUCKET_NAME }}
      
      - name: Set cache headers for static assets
        run: |
          # Cache CSS, JS, and images for a long time
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000" \
            "gs://${{ env.BUCKET_NAME }}/*.css" || true
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000" \
            "gs://${{ env.BUCKET_NAME }}/*.js" || true
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000" \
            "gs://${{ env.BUCKET_NAME }}/*.png" || true
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000" \
            "gs://${{ env.BUCKET_NAME }}/*.svg" || true
          
          # HTML files should check for updates more frequently
          gsutil -m setmeta -h "Cache-Control:public, max-age=3600" \
            "gs://${{ env.BUCKET_NAME }}/*.html" || true
      
      - name: Set public access
        run: |
          # Make all files publicly readable
          gsutil -m acl ch -u AllUsers:R "gs://${{ env.BUCKET_NAME }}/**"
      
      - name: Invalidate CDN cache (if configured)
        run: |
          # Invalidate CDN cache to serve new version immediately
          gcloud compute url-maps invalidate-cdn-cache ${{ env.CDN_BACKEND }} \
            --path "/*" --async || echo "CDN not configured, skipping invalidation"
      
      - name: Output deployment URL
        run: |
          echo "🚀 Landing page deployed to PROD!"
          echo "🔗 URL: https://glundia.com"
          echo "📦 Storage URL: https://storage.googleapis.com/${{ env.BUCKET_NAME }}/index.html"
